<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Control Console</title>
    <style>
        body {
            background-color: #1E1E2D;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
        }
        .border-panel {
            border: 2px solid #4B5563;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
        }
        .coding-font {
            font-family: 'Courier New', Courier, monospace;
            background-color: #171717;
            color: #00FF00;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
            max-height: 300px;
            white-space: pre;
        }
        .metrics {
            margin-bottom: 1rem;
        }
        #start-button {
            background-color: #50fa7b;
            color: #282A36;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #start-button.disabled {
            background-color: #808080;
        }
        .error-message {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-6 py-10">
        <div class="border-panel">
            <h2 class="text-lg font-bold">Server Console</h2>
            <div class="metrics">
                <div><strong>RAM:</strong> 16 GB</div>
                <div><strong>CPU:</strong> 4 Core</div>
                <div><strong>Harddisk:</strong> 500 GB</div>
                <div><strong>IP Address:</strong> 192.168.1.1</div>
            </div>
            <div class="coding-font" id="console-output"></div>
            <button id="start-button">Start</button>
        </div>
    </div>
    <script>
        const messages = [
            "[Pterodactyl Daemon]: Checking server disk space usage, this could take a few seconds...",
            "[Pterodactyl Daemon]: Updating process configuration files...",
            "[Pterodactyl Daemon]: Ensuring file permissions are set correctly, this could take a few seconds...",
            "container@pterodactyl~ Server marked as starting...",
            "container@pterodactyl Server marked as offline...",
            "[Pterodactyl Daemon]: ---------- Detected server process in a crashed state! ----------",
            "[Pterodactyl Daemon]: Exit code: 137",
            "[Pterodactyl Daemon]: Out of memory: true",
            "[Pterodactyl Daemon]: Checking server disk space usage, this could take a few seconds...",
            "[Pterodactyl Daemon]: Updating process configuration files...",
            "[Pterodactyl Daemon]: Ensuring file permissions are set correctly, this could take a few seconds..."
        ];

        const startButton = document.getElementById("start-button");
        const consoleOutput = document.getElementById("console-output");

        startButton.addEventListener("click", function () {
            startButton.classList.add("disabled");
            startButton.disabled = true;

            let currentMessageIndex = 0;

            function displayMessage() {
                if (currentMessageIndex < messages.length) {
                    consoleOutput.innerText += messages[currentMessageIndex] + "\n";
                    currentMessageIndex++;

                    if (currentMessageIndex === 5) {
                        consoleOutput.innerHTML += "<span class='error-message'>container@pterodactyl Server marked as offline...</span>\n";
                    }

                    setTimeout(displayMessage, 2000);
                } else {
                    startButton.classList.remove("disabled");
                    startButton.disabled = false;
                }
            }

            displayMessage();
        });
    </script>
</body>
</html>
