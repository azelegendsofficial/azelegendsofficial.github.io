<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Linktree 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .close-modal {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }

        .server-info {
            margin-top: 10px;
            line-height: 1.6;
        }

        .update-content {
            text-align: center;
            padding: 20px 0;
        }

        .update-version {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .update-details {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        .profile {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .profile-glow {
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(20px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .profile img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            object-fit: cover;
        }

        .profile h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .profile p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            max-width: 300px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 0 10px;
        }

        .link {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            overflow: hidden;
            cursor: pointer;
        }

        .link:hover {
            transform: translateY(-2px) scale(1.01);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .link:hover::before {
            left: 100%;
        }

        .link i {
            font-size: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.2);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        .server-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-box:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .update-box {
            margin-top: 10px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .update-box:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="modal" id="serverModal" onclick="closeModal('serverModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal('serverModal')">×</span>
            <h2>Server Information</h2>
            <div class="server-info">
                <p>📡 IP SERVER</p>
                <p>Java Support: ✅</p>
                <p>Bedrock Support: ✅</p>
                <p>Version: 1.8 - 1.20.X</p>
                <p>Region: America</p>
                <p>Ping: 32ms</p>
            </div>
        </div>
    </div>

    <div class="modal" id="updateModal" onclick="closeModal('updateModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal('updateModal')">×</span>
            <div class="update-content">
                <div class="update-version">VERSION 1.7</div>
                <div class="update-details">kosong</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="profile">
            <div class="profile-glow"></div>
            <img src="/api/placeholder/130/130" alt="Profile Picture" class="floating">
            <h1>SPACE NETWORK</h1>
            <p>Server Terbaik Sepanjang Masa</p>
        </div>
        <div class="links">
            <a href="#" class="link">
                <div class="link-content">
                    <span>📸</span>
                    <span>Instagram</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>🎵</span>
                    <span>TikTok</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>💚</span>
                    <span>WhatsApp</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>🎥</span>
                    <span>YouTube Channel</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>✍️</span>
                    <span>Blog</span>
                </div>
            </a>
            <div class="server-box" onclick="openModal('serverModal')">
                <div class="link-content">
                    <span>🎮</span>
                    <span>IP SERVER</span>
                </div>
            </div>
            <div class="update-box" onclick="openModal('updateModal')">
                <div class="link-content">
                    <span>📢</span>
                    <span>NEW UPDATE</span>
                </div>
            </div>
        </div>
        <div class="social-icons">
            <a href="#" class="social-icon">📱</a>
            <a href="#" class="social-icon">📧</a>
            <a href="#" class="social-icon">💬</a>
        </div>
    </div>

    <script>
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
    </script>
</body>
</html>
