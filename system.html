<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #111827;
            font-weight: 700;
            margin: 15px 0;
            letter-spacing: -0.5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
        }

        .box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        /* Category-specific styles */
        .node-info {
            border-top: 5px solid #3b82f6;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1);
        }

        .region-info {
            border-top: 5px solid #10b981;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.1);
        }

        .system-info {
            border-top: 5px solid #8b5cf6;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.1);
        }

        .category {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
        }

        .node-info .category { color: #3b82f6; }
        .region-info .category { color: #10b981; }
        .system-info .category { color: #8b5cf6; }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .label {
            font-weight: 600;
            color: #64748b;
            min-width: 140px;
        }

        .value {
            color: #0f172a;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6" y2="6"></line>
                <line x1="6" y1="18" x2="6" y2="18"></line>
            </svg>
            <h1>System Information</h1>
        </div>

        <div class="grid">
            <div class="box node-info">
                <p class="category">Node Information</p>
                <div class="info-item">
                    <span class="label">NODE</span>
                    <span class="value">NYC-01-F</span>
                </div>
                <div class="info-item">
                    <span class="label">SERVER ID</span>
                    <span class="value">16ee389</span>
                </div>
            </div>

            <div class="box region-info">
                <p class="category">Region and Versions</p>
                <div class="info-item">
                    <span class="label">REGION</span>
                    <span class="value">Indonesia</span>
                </div>
                <div class="info-item">
                    <span class="label">DASHBOARD</span>
                    <span class="value">v1.2</span>
                </div>
                <div class="info-item">
                    <span class="label">CANVA</span>
                    <span class="value">2.4</span>
                </div>
            </div>

            <div class="box system-info">
                <p class="category">System Operation</p>
                <div class="info-item">
                    <span class="label">OS</span>
                    <span class="value">Ubuntu</span>
                </div>
                <div class="info-item">
                    <span class="label">VERSION</span>
                    <span class="value">LTS 24.04.1</span>
                </div>
                <div class="info-item">
                    <span class="label">RUN</span>
                    <span class="value">Ubuntu Server</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
