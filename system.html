<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi</title>
    <style>
      body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background-color: #f8f9fa;
    color: #212529;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    background-color: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

header {
    text-align: center;
    margin-bottom: 40px;
}

header img {
    width: 80px;
    margin-bottom: 20px;
}

main {
    display: flex;
    flex-direction: column;
    gap: 40px;
}

.kategori {
    background-color: #f7f7f7;
    padding: 20px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
}

.kategori h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #6c757d;
    margin-bottom: 20px;
}

.box {
    background-color: #ffffff;
    padding: 20px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
}

.label {
    font-weight: 600;
    color: #495057;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Ikon Sistem">
            <h1>INFORMASI SISTEM</h1>
        </header>
        <main>
            <section class="kategori">
                <h2>Informasi Node</h2>
                <div class="box">
                    <p><span class="label">NODE:</span> NYC-01-F</p>
                    <p><span class="label">ID SERVER:</span> 16ee389</p>
                </div>
            </section>
            <section class="kategori">
                <h2>Regional dan Versi</h2>
                <div class="box">
                    <p><span class="label">WILAYAH:</span> Indonesia</p>
                    <p><span class="label">VERSI DASHBOARD:</span> v1.2</p>
                    <p><span class="label">VERSI CANVA:</span> 2.4</p>
                </div>
            </section>
            <section class="kategori">
                <h2>Operasi Sistem</h2>
                <div class="box">
                    <p><span class="label">SISTEM OPERASI:</span> Ubuntu</p>
                    <p><span class="label">VERSI:</span> LTS 24.04.1</p>
                    <p><span class="label">RUN:</span> Ubuntu Server</p>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
